<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks — ProjectHub</title>
  <meta name="description" content="Manage and track all project tasks with kanban board.">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
  <div id="toast-container"></div>
  <div class="app-layout">
    <div class="main-content">
      <div class="page-header animate-in flex-between">
        <div>
          <h1>Tasks</h1>
          <p class="text-muted" id="tasks-subtitle">Manage and track project tasks</p>
        </div>
        <button class="btn btn-primary" id="new-task-btn">➕ New Task</button>
      </div>

      <!-- Filter Bar -->
      <div class="filter-bar">
        <div class="search-input-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" class="form-control" placeholder="Search tasks…">
        </div>
        <select id="filter-status" class="form-control" style="width:auto;min-width:140px;">
          <option value="">All Status</option>
          <option value="pending">Pending</option>
          <option value="in-progress">In Progress</option>
          <option value="completed">Completed</option>
        </select>
        <select id="filter-priority" class="form-control" style="width:auto;min-width:140px;">
          <option value="">All Priority</option>
          <option value="high">🔴 High</option>
          <option value="medium">🟡 Medium</option>
          <option value="low">🟢 Low</option>
        </select>
        <select id="filter-project" class="form-control" style="width:auto;min-width:160px;">
          <option value="">All Projects</option>
        </select>
      </div>

      <!-- Kanban Board -->
      <div class="kanban-board" id="kanban-board">
        <div class="kanban-col">
          <div class="kanban-col-header">
            <div class="kanban-col-title">
              <span style="color:#94a3b8;">⬜</span> Pending
              <div class="kanban-count" id="cnt-pending">0</div>
            </div>
          </div>
          <div class="kanban-cards" id="col-pending" data-status="pending"></div>
        </div>
        <div class="kanban-col">
          <div class="kanban-col-header">
            <div class="kanban-col-title">
              <span style="color:#22d3ee;">🔄</span> In Progress
              <div class="kanban-count" id="cnt-inprogress">0</div>
            </div>
          </div>
          <div class="kanban-cards" id="col-in-progress" data-status="in-progress"></div>
        </div>
        <div class="kanban-col">
          <div class="kanban-col-header">
            <div class="kanban-col-title">
              <span style="color:#34d399;">✅</span> Completed
              <div class="kanban-count" id="cnt-completed">0</div>
            </div>
          </div>
          <div class="kanban-cards" id="col-completed" data-status="completed"></div>
        </div>
      </div>

      <!-- Pagination -->
      <div id="pagination-bar" style="display:flex;justify-content:center;align-items:center;gap:12px;margin-top:24px;display:none;">
        <button class="btn btn-ghost btn-sm" id="prev-page" disabled>← Prev</button>
        <span id="page-info" style="font-size:0.85rem;color:var(--text-muted);">Page 1</span>
        <button class="btn btn-ghost btn-sm" id="next-page">Next →</button>
      </div>
    </div>
  </div>

  <!-- Create Task Modal Template -->
  <template id="task-modal-tpl">
    <div class="modal-header">
      <h3>Create New Task</h3>
      <button class="modal-close">×</button>
    </div>
    <form id="task-form">
      <div class="form-group">
        <label>Project *</label>
        <select id="task-project" class="form-control" required></select>
      </div>
      <div class="form-group">
        <label>Task Title *</label>
        <input type="text" id="task-title" class="form-control" placeholder="Enter task title" required>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="task-desc" class="form-control" rows="3" placeholder="Optional description…" style="resize:vertical;"></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label>Priority</label>
          <select id="task-priority" class="form-control">
            <option value="low">🟢 Low</option>
            <option value="medium" selected>🟡 Medium</option>
            <option value="high">🔴 High</option>
          </select>
        </div>
        <div class="form-group">
          <label>Due Date</label>
          <input type="date" id="task-due" class="form-control">
        </div>
      </div>
      <div class="form-group" id="assignee-group">
        <label>Assign To</label>
        <select id="task-assignee" class="form-control">
          <option value="">Unassigned</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">
        <span id="task-btn-text">Create Task</span>
        <span class="spinner" id="task-spinner" style="display:none"></span>
      </button>
    </form>
  </template>

  <script type="module">
    import { ApiClient } from '../js/api.js';
    import { requireAuth, buildSidebar, buildTopbar, showToast, initToast, openModal, timeAgo, formatDate } from '../js/ui.js';

    initToast();
    const user = requireAuth(); if (!user) throw new Error();
    buildSidebar('tasks');
    buildTopbar('Tasks');

    const isFaculty = user.role === 'faculty';
    let allTasks = [];
    let projects = [];
    let currentPage = 1;
    const PAGE_LIMIT = 20;

    if (!isFaculty) {
      document.getElementById('tasks-subtitle').textContent = 'Your assigned tasks';
    }

    async function loadProjects() {
      try {
        const res = await ApiClient.get('/projects');
        projects = res.projects || [];
        // Populate project filter
        const sel = document.getElementById('filter-project');
        projects.forEach(p => { sel.innerHTML += `<option value="${p._id}">${p.name}</option>`; });
      } catch (_) {}
    }

    function renderKanban(tasks) {
      const cols = { 'pending': [], 'in-progress': [], 'completed': [] };
      tasks.forEach(t => { if (cols[t.status]) cols[t.status].push(t); });

      Object.entries(cols).forEach(([status, colTasks]) => {
        const col = document.getElementById(`col-${status}`);
        const cnt = document.getElementById(`cnt-${status === 'in-progress' ? 'inprogress' : status}`);
        if (cnt) cnt.textContent = colTasks.length;
        if (!col) return;

        if (colTasks.length === 0) {
          col.innerHTML = `<div style="text-align:center;padding:30px 10px;color:var(--text-muted);font-size:0.82rem;">No tasks here</div>`;
          return;
        }

        col.innerHTML = colTasks.map(t => {
          const due = t.dueDate ? new Date(t.dueDate) : null;
          const overdue = due && due < new Date() && t.status !== 'completed';
          const isMyTask = t.assignedTo?._id === user.id || t.assignedTo === user.id;
          const canChangeStatus = isFaculty || isMyTask;

          return `
            <div class="kanban-card" data-id="${t._id}">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
                <div style="font-size:0.9rem;font-weight:600;flex:1;">${t.title}</div>
                <span class="badge badge-${t.priority}">${t.priority}</span>
              </div>
              ${t.description ? `<div style="font-size:0.78rem;color:var(--text-secondary);margin-bottom:10px;line-height:1.4;">${t.description.slice(0,80)}${t.description.length>80?'…':''}</div>` : ''}
              <div style="font-size:0.72rem;color:var(--text-muted);margin-bottom:8px;">
                📁 ${t.project?.name || 'Unknown'}
              </div>
              <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;">
                ${t.assignedTo ? `<span style="font-size:0.72rem;color:var(--text-muted);">👤 ${t.assignedTo.name}</span>` : '<span></span>'}
                ${due ? `<span class="task-deadline ${overdue?'overdue':''}">${overdue?'🔴 ':'📅 '}${due.toLocaleDateString()}</span>` : ''}
              </div>
              ${canChangeStatus ? `
              <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;">
                ${status !== 'in-progress' && status !== 'completed' ? `<button class="btn btn-ghost btn-sm" onclick="changeStatus('${t._id}','in-progress')" style="font-size:0.72rem;padding:4px 8px;">→ In Progress</button>` : ''}
                ${status !== 'completed' ? `<button class="btn btn-ghost btn-sm" onclick="changeStatus('${t._id}','completed')" style="font-size:0.72rem;padding:4px 8px;color:var(--emerald);">✓ Complete</button>` : ''}
                ${status === 'in-progress' ? `<button class="btn btn-ghost btn-sm" onclick="changeStatus('${t._id}','pending')" style="font-size:0.72rem;padding:4px 8px;color:var(--text-muted);">← Pending</button>` : ''}
                ${isFaculty ? `<button class="btn btn-danger btn-sm" onclick="deleteTask('${t._id}')" style="font-size:0.72rem;padding:4px 8px;margin-left:auto;">🗑</button>` : ''}
              </div>
              ` : ''}
            </div>
          `;
        }).join('');
      });
    }

    function filterAndRender() {
      const search = document.getElementById('search-input').value.toLowerCase();
      const status = document.getElementById('filter-status').value;
      const priority = document.getElementById('filter-priority').value;
      const projId = document.getElementById('filter-project').value;

      const filtered = allTasks.filter(t =>
        (!search || t.title.toLowerCase().includes(search) || (t.description||'').toLowerCase().includes(search)) &&
        (!status || t.status === status) &&
        (!priority || t.priority === priority) &&
        (!projId || (t.project?._id || t.project) === projId)
      );
      renderKanban(filtered);
    }

    async function loadTasks(page = 1) {
      try {
        const res = await ApiClient.get(`/tasks?limit=${PAGE_LIMIT}&page=${page}`);
        allTasks = res.tasks || [];
        const pagination = res.pagination || {};

        filterAndRender();

        // Pagination controls
        const paginationBar = document.getElementById('pagination-bar');
        if (pagination.pages > 1) {
          paginationBar.style.display = 'flex';
          document.getElementById('page-info').textContent = `Page ${pagination.page} of ${pagination.pages}`;
          document.getElementById('prev-page').disabled = pagination.page <= 1;
          document.getElementById('next-page').disabled = pagination.page >= pagination.pages;
          currentPage = pagination.page;
        } else {
          paginationBar.style.display = 'none';
        }
      } catch (err) {
        showToast('error', 'Error', 'Failed to load tasks');
      }
    }

    window.changeStatus = async (taskId, newStatus) => {
      try {
        await ApiClient.patch(`/tasks/${taskId}/status`, { status: newStatus });
        const t = allTasks.find(t => t._id === taskId);
        if (t) t.status = newStatus;
        filterAndRender();
        showToast('success', 'Updated', `Task moved to ${newStatus}`);
      } catch (err) {
        showToast('error', 'Error', err.message);
      }
    };

    window.deleteTask = async (taskId) => {
      if (!confirm('Delete this task?')) return;
      try {
        await ApiClient.delete(`/tasks/${taskId}`);
        allTasks = allTasks.filter(t => t._id !== taskId);
        filterAndRender();
        showToast('success', 'Deleted', 'Task removed');
      } catch (err) {
        showToast('error', 'Error', err.message);
      }
    };

    // Pagination
    document.getElementById('prev-page').addEventListener('click', () => loadTasks(currentPage - 1));
    document.getElementById('next-page').addEventListener('click', () => loadTasks(currentPage + 1));

    // New Task Modal
    document.getElementById('new-task-btn').addEventListener('click', () => {
      const tpl = document.getElementById('task-modal-tpl').content.cloneNode(true);
      const div = document.createElement('div');
      div.appendChild(tpl);
      const overlay = openModal(div.innerHTML);

      // Populate project select
      const projSel = overlay.querySelector('#task-project');
      projects.forEach(p => { projSel.innerHTML += `<option value="${p._id}">${p.name}</option>`; });
      if (projects.length === 0) {
        projSel.innerHTML = '<option value="">No projects available</option>';
      }

      // Load members when project selected
      projSel.addEventListener('change', async () => {
        const sel = overlay.querySelector('#task-assignee');
        sel.innerHTML = '<option value="">Unassigned</option>';
        if (!projSel.value) return;
        try {
          const res = await ApiClient.get(`/projects/${projSel.value}`);
          // m = { user: {...}, role } — access m.user
          (res.project?.members || []).forEach(m => {
            const memberUser = m.user || {};
            if (memberUser._id) {
              sel.innerHTML += `<option value="${memberUser._id}">${memberUser.name} (${memberUser.role})</option>`;
            }
          });
        } catch (_) {}
      });

      // Auto-select first project and trigger change
      if (projects.length > 0) {
        projSel.value = projects[0]._id;
        projSel.dispatchEvent(new Event('change'));
      }

      overlay.querySelector('#task-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btnText = overlay.querySelector('#task-btn-text');
        const spinner = overlay.querySelector('#task-spinner');
        btnText.style.display = 'none'; spinner.style.display = 'inline-block';
        try {
          await ApiClient.post('/tasks', {
            title: overlay.querySelector('#task-title').value.trim(),
            description: overlay.querySelector('#task-desc').value.trim(),
            projectId: overlay.querySelector('#task-project').value,
            priority: overlay.querySelector('#task-priority').value,
            dueDate: overlay.querySelector('#task-due').value || null,
            assignedTo: overlay.querySelector('#task-assignee').value || null,
          });
          showToast('success', 'Task Created', 'New task added to board');
          overlay.remove();
          loadTasks();
        } catch (err) {
          showToast('error', 'Error', err.message);
          btnText.style.display = 'inline'; spinner.style.display = 'none';
        }
      });
    });

    // Filters
    ['search-input','filter-status','filter-priority','filter-project'].forEach(id => {
      document.getElementById(id)?.addEventListener('input', filterAndRender);
      document.getElementById(id)?.addEventListener('change', filterAndRender);
    });

    // ── Real-time Socket.IO ───────────────────────────────────
    // Connect to socket and join all user's project rooms
    // so task updates from ANY user are reflected instantly
    async function initRealtime() {
      // Load the socket.io client script
      const loadSocketScript = () => new Promise((resolve) => {
        if (window.io) { resolve(); return; }
        const script = document.createElement('script');
        script.src = '/socket.io/socket.io.js';
        script.onload = resolve;
        document.head.appendChild(script);
      });

      await loadSocketScript();

      const socket = io();

      // Join all project rooms so we receive updates from teammates
      projects.forEach(p => {
        socket.emit('join:project', { projectId: p._id, userId: user.id, userName: user.name });
      });

      // Task created by someone else → refresh board silently
      socket.on('task:created', ({ task }) => {
        showToast('info', '📝 New Task', `"${task.title}" was added`);
        loadTasks(currentPage);   // refresh from server
      });

      // Task status updated by someone else → update in-place
      socket.on('task:updated', ({ task, updatedBy, newStatus }) => {
        // Update the task in our local array
        const idx = allTasks.findIndex(t => t._id === (task._id || task));
        if (idx !== -1) {
          allTasks[idx] = { ...allTasks[idx], ...task };
          filterAndRender();
        } else {
          loadTasks(currentPage);
        }
        if (updatedBy && updatedBy !== user.name) {
          showToast('info', '🔄 Task Updated', `${updatedBy} → ${newStatus || 'updated'}`);
        }
      });

      console.log('🔌 Real-time task sync active for', projects.length, 'projects');
    }

    // Init
    async function init() {
      await loadProjects();
      await loadTasks();
      initRealtime();   // connect after projects are loaded
    }
    init();
  </script>
</body>
</html>
