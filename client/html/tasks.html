<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks — ProjectHub</title>
  <meta name="description" content="Manage your project tasks using an interactive Kanban board.">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/components.css">
  <script src="https://bernardo-castilho.github.io/DragDropTouch/DragDropTouch.js"></script>
</head>
<body>
  <div class="app-layout">
    <div class="main-content" id="main-content">
      
      <div class="page-header animate-in flex-between">
        <div>
          <h1>Tasks Board</h1>
          <p class="text-muted">Drag and drop tasks to update progress. (Shortcut: N to create)</p>
        </div>
        <button class="btn btn-primary" id="new-task-btn">
          <span>➕</span> New Task
        </button>
      </div>

      <!-- Filters -->
      <div class="filter-bar animate-in" style="animation-delay:0.05s;">
        <div class="form-group" style="margin:0;">
          <select id="project-filter" class="form-control" style="min-width:200px;">
            <option value="">All Projects</option>
          </select>
        </div>
        <div class="form-group" style="margin:0;">
          <select id="user-filter" class="form-control" style="min-width:200px;">
            <option value="">All Members</option>
            <option value="me">Assigned to Me</option>
          </select>
        </div>
        <div class="search-input-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-tasks" class="form-control" placeholder="Search tasks...">
        </div>
      </div>

      <!-- Kanban Board -->
      <div class="kanban-board animate-in" style="animation-delay:0.1s;">
        <!-- Pending Column -->
        <div class="kanban-col" data-status="pending">
          <div class="kanban-col-header">
            <div class="kanban-col-title">
              <div style="width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.2);"></div>
              Pending
            </div>
            <div class="kanban-count" id="count-pending">0</div>
          </div>
          <div class="kanban-cards" id="col-pending"></div>
        </div>

        <!-- In Progress Column -->
        <div class="kanban-col" data-status="in-progress">
          <div class="kanban-col-header">
            <div class="kanban-col-title">
              <div style="width:10px;height:10px;border-radius:50%;background:var(--cyan);"></div>
              In Progress
            </div>
            <div class="kanban-count" id="count-in-progress">0</div>
          </div>
          <div class="kanban-cards" id="col-in-progress"></div>
        </div>

        <!-- Completed Column -->
        <div class="kanban-col" data-status="completed">
          <div class="kanban-col-header">
            <div class="kanban-col-title">
              <div style="width:10px;height:10px;border-radius:50%;background:var(--emerald);"></div>
              Completed
            </div>
            <div class="kanban-count" id="count-completed">0</div>
          </div>
          <div class="kanban-cards" id="col-completed"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { ApiClient } from '../js/api.js';
    import { requireAuth, buildSidebar, buildTopbar, showToast, openModal, fireConfetti, avatarInitials } from '../js/ui.js';

    const user = requireAuth();
    if (!user) throw new Error('Not authenticated');

    buildSidebar('tasks');
    buildTopbar('Tasks');

    let allTasks = [];
    let currentProjects = [];
    let draggedTaskEl = null;

    // ── Setup Kanban Drag & Drop ──
    function setupKanbanDragDrop() {
      const columns = document.querySelectorAll('.kanban-col');
      
      columns.forEach(col => {
        col.addEventListener('dragover', e => {
          e.preventDefault();
          col.classList.add('drag-over');
        });

        col.addEventListener('dragleave', () => {
          col.classList.remove('drag-over');
        });

        col.addEventListener('drop', async e => {
          e.preventDefault();
          col.classList.remove('drag-over');
          
          if (!draggedTaskEl) return;
          
          const newStatus = col.getAttribute('data-status');
          const taskId = draggedTaskEl.getAttribute('data-id');
          const oldStatus = draggedTaskEl.getAttribute('data-status');
          
          if (newStatus === oldStatus) return; // No change
          
          // Move instantly in UI
          const targetCardsContainer = col.querySelector('.kanban-cards');
          targetCardsContainer.appendChild(draggedTaskEl);
          draggedTaskEl.setAttribute('data-status', newStatus);
          
          // Update counts
          updateKanbanCounts();
          
          // Confetti!
          if (newStatus === 'completed') fireConfetti();
          
          try {
            await ApiClient.put(`/tasks/${taskId}`, { status: newStatus });
            // Emit socket event implicitly done via server
          } catch (err) {
            showToast('error', 'Update failed', 'Could not save task status.');
            loadTasks(); // reload state
          }
        });
      });
    }

    // ── Load Projects for Filters ──
    async function loadProjects() {
      try {
        const res = await ApiClient.get('/projects');
        currentProjects = res.projects || [];
        const select = document.getElementById('project-filter');
        currentProjects.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p._id;
          opt.textContent = p.name;
          select.appendChild(opt);
        });
      } catch (err) {
        console.error(err);
      }
    }

    // ── Load & Render Tasks ──
    async function loadTasks() {
      try {
        const cols = {
          'pending': document.getElementById('col-pending'),
          'in-progress': document.getElementById('col-in-progress'),
          'completed': document.getElementById('col-completed')
        };
        Object.values(cols).forEach(c => c.innerHTML = '<div class="spinner" style="margin:40px auto;"></div>');

        const pId = document.getElementById('project-filter').value;
        const url = pId ? `/tasks/project/${pId}` : '/tasks';
        const res = await ApiClient.get(url);
        allTasks = res.tasks || [];
        renderTasks();
      } catch (err) {
        showToast('error', 'Error', 'Failed to load tasks.');
        Object.values(cols).forEach(c => c.innerHTML = '<div class="empty-state"><p>Error loading tasks</p></div>');
      }
    }

    function renderTasks() {
      const q = document.getElementById('search-tasks').value.toLowerCase();
      const u = document.getElementById('user-filter').value;
      
      const filtered = allTasks.filter(t => {
        const matchQ = t.title.toLowerCase().includes(q) || (t.description || '').toLowerCase().includes(q);
        let matchU = true;
        if (u === 'me') matchU = t.assignedTo?._id === user.id;
        return matchQ && matchU;
      });

      const cols = {
        'pending': document.getElementById('col-pending'),
        'in-progress': document.getElementById('col-in-progress'),
        'completed': document.getElementById('col-completed')
      };
      
      Object.values(cols).forEach(c => c.innerHTML = '');

      filtered.forEach(task => {
        const c = cols[task.status] || cols['pending'];
        const due = task.dueDate ? new Date(task.dueDate) : null;
        const overdue = due && due < new Date() && task.status !== 'completed';
        const dateStr = due ? due.toLocaleDateString() : '';
        const isMyTask = task.assignedTo?._id === user.id;
        
        const card = document.createElement('div');
        card.className = 'kanban-card';
        card.draggable = user.role === 'faculty' || isMyTask; // Only faculty or assignee can drag
        card.setAttribute('data-id', task._id);
        card.setAttribute('data-status', task.status);
        card.setAttribute('data-priority', task.priority || 'medium');
        
        card.innerHTML = `
          <div class="task-title">${task.title}</div>
          <div class="task-desc">${task.description || '<span style="opacity:0.5;font-style:italic">No description</span>'}</div>
          
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:12px;">
            <span class="badge badge-${task.priority || 'medium'}">${task.priority || 'medium'}</span>
            ${task.project?.name ? `<span style="font-size:0.7rem;color:var(--text-muted);border:1px solid var(--border);padding:2px 6px;border-radius:4px;">${task.project.name}</span>` : ''}
          </div>
          
          <div class="task-meta">
            ${task.assignedTo ? `
              <div class="task-assignee" title="${task.assignedTo.name}">
                ${task.assignedTo.avatar 
                  ? `<img src="${task.assignedTo.avatar}" alt="">` 
                  : `<div class="avatar-fallback">${avatarInitials(task.assignedTo.name)}</div>`}
                <span>${task.assignedTo.name.split(' ')[0]}</span>
              </div>
            ` : '<span class="text-xs text-muted">Unassigned</span>'}
            
            ${due ? `<div class="task-deadline ${overdue ? 'overdue' : ''}" title="Due date">⏳ ${dateStr}</div>` : ''}
          </div>
          ${isMyTask ? `<button class="btn btn-ghost btn-sm task-upload-btn" data-taskid="${task._id}" data-projectid="${task.project?._id || ''}" title="Upload file for this task" style="margin-top:10px;width:100%;font-size:0.75rem;padding:6px 10px;border:1px dashed var(--border);">📎 Upload File</button>` : ''}
        `;

        // Drag events (only for faculty or assigned student)
        if (card.draggable) {
          card.addEventListener('dragstart', (e) => {
            draggedTaskEl = card;
            card.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
          });
          
          card.addEventListener('dragend', () => {
            draggedTaskEl = null;
            card.classList.remove('dragging');
          });
        }

        // Click to view/edit task
        card.addEventListener('click', (e) => {
          if (card.classList.contains('dragging')) return;
          if (e.target.closest('.task-upload-btn')) return; // Don't open modal if upload btn clicked
          if (user.role === 'faculty') {
            openTaskModal(task); // Faculty gets full edit
          } else {
            openTaskViewModal(task); // Students get read-only view
          }
        });

        // Upload button click handler for students
        const uploadBtn = card.querySelector('.task-upload-btn');
        if (uploadBtn) {
          uploadBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            openQuickUpload(task);
          });
        }

        c.appendChild(card);
      });

      // Add empty states for empty columns
      Object.keys(cols).forEach(key => {
        const c = cols[key];
        if (c.children.length === 0) {
          c.innerHTML = `
            <div class="empty-state" style="padding: 20px 10px; margin-top: 10px; border: 2px dashed rgba(255,255,255,0.05); border-radius: var(--radius-md);">
              <div class="icon" style="font-size: 1.5rem; margin-bottom: 8px;">${key === 'completed' ? '🎉' : '📋'}</div>
              <p style="font-size: 0.8rem; color: var(--text-muted); margin: 0;">No tasks ${key.replace('-', ' ')}</p>
            </div>
          `;
        }
      });

      updateKanbanCounts();
    }

    function updateKanbanCounts() {
      ['pending', 'in-progress', 'completed'].forEach(s => {
        // filter out empty-state div from count
        const col = document.getElementById(`col-${s}`);
        const count = Array.from(col.children).filter(child => !child.classList.contains('empty-state')).length;
        document.getElementById(`count-${s}`).textContent = count;
      });
    }

    // ── Task Modal (Create & Edit) ──
    async function openTaskModal(task = null) {
      const isEdit = !!task;
      
      const modal = openModal(`
        <div class="modal-header">
          <h3>${isEdit ? 'Task Details' : 'Create New Task'}</h3>
          <button class="modal-close">×</button>
        </div>
        <form id="task-form">
          <div class="form-group">
            <label>Task Title</label>
            <input type="text" id="t-title" class="form-control" value="${task?.title || ''}" required placeholder="What needs to be done?">
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea id="t-desc" class="form-control" rows="3" placeholder="Add some details...">${task?.description || ''}</textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Project</label>
              <select id="t-project" class="form-control" required ${isEdit ? 'disabled' : ''}>
                <option value="">Select Project</option>
                ${currentProjects.map(p => `<option value="${p._id}" ${task?.project?._id === p._id ? 'selected' : ''}>${p.name}</option>`).join('')}
              </select>
            </div>
            <div class="form-group">
              <label>Assign To</label>
              <select id="t-assignee" class="form-control" required>
                <option value="">Select Member</option>
                <!-- Populated dynamically -->
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Status</label>
              <select id="t-status" class="form-control">
                <option value="pending" ${task?.status === 'pending' ? 'selected' : ''}>Pending</option>
                <option value="in-progress" ${task?.status === 'in-progress' ? 'selected' : ''}>In Progress</option>
                <option value="completed" ${task?.status === 'completed' ? 'selected' : ''}>Completed</option>
              </select>
            </div>
            <div class="form-group">
              <label>Priority</label>
              <select id="t-priority" class="form-control">
                <option value="low" ${task?.priority === 'low' ? 'selected' : ''}>🟢 Low</option>
                <option value="medium" ${task?.priority === 'medium' || !task ? 'selected' : ''}>🟡 Medium</option>
                <option value="high" ${task?.priority === 'high' ? 'selected' : ''}>🔴 High</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Due Date</label>
            <input type="date" id="t-due" class="form-control" value="${task?.dueDate ? task.dueDate.split('T')[0] : ''}">
          </div>
          <div style="display:flex;justify-content:${isEdit ? 'space-between' : 'flex-end'};margin-top:30px;">
            ${isEdit && user.role === 'faculty' ? `<button type="button" class="btn btn-danger" id="btn-delete-task">🗑️ Delete</button>` : '<div></div>'}
            <button type="submit" class="btn btn-primary">${isEdit ? 'Save Changes' : 'Create Task'}</button>
          </div>
        </form>
      `);

      const form = modal.querySelector('#task-form');
      const pSelect = modal.querySelector('#t-project');
      const aSelect = modal.querySelector('#t-assignee');

      // Populate assignees when project changes
      const updateAssignees = async () => {
        const pId = pSelect.value;
        try {
          if (user.role === 'faculty') {
            const res = await ApiClient.get('/users');
            const allUsers = res.users || [];
            aSelect.innerHTML = '<option value="">Select Member (All Students)</option>' + 
              allUsers.map(m => `<option value="${m._id}" ${task?.assignedTo?._id === m._id ? 'selected' : ''}>${m.name} (${m.role})</option>`).join('');
          } else {
            if (!pId) { aSelect.innerHTML = '<option value="">Select Member</option>'; return; }
            const p = await ApiClient.get(`/projects/${pId}`);
            const members = p.project?.members || [];
            aSelect.innerHTML = '<option value="">Select Member</option>' + 
              members.map(m => `<option value="${m.user?._id || m._id}" ${task?.assignedTo?._id === (m.user?._id || m._id) ? 'selected' : ''}>${m.user?.name || m.name} (${m.role})</option>`).join('');
          }
        } catch (e) {
          console.error(e);
        }
      };
      
      pSelect.addEventListener('change', updateAssignees);
      if (isEdit || pSelect.value) updateAssignees();

      // Submit
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const payload = {
          title: modal.querySelector('#t-title').value,
          description: modal.querySelector('#t-desc').value,
          projectId: pSelect.value,
          assignedTo: aSelect.value || null,
          status: modal.querySelector('#t-status').value,
          priority: modal.querySelector('#t-priority').value,
          dueDate: modal.querySelector('#t-due').value || null
        };

        try {
          if (isEdit) {
            await ApiClient.put(`/tasks/${task._id}`, payload);
            if (payload.status === 'completed' && task.status !== 'completed') fireConfetti();
            showToast('success', 'Task Updated', 'Saved successfully.');
          } else {
            await ApiClient.post('/tasks', payload);
            showToast('success', 'Task Created', 'New task added to board.');
          }
          modal.remove();
          loadTasks();
        } catch (err) {
          showToast('error', 'Error', err.message);
        }
      });

      // Delete
      const delBtn = modal.querySelector('#btn-delete-task');
      if (delBtn) {
        delBtn.addEventListener('click', async () => {
          if (!confirm('Are you sure you want to delete this task?')) return;
          try {
            await ApiClient.delete(`/tasks/${task._id}`);
            showToast('success', 'Deleted', 'Task removed.');
            modal.remove();
            loadTasks();
          } catch (err) {
            showToast('error', 'Error', err.message);
          }
        });
      }
    }

    // ── Student: Read-Only Task View ──
    function openTaskViewModal(task) {
      const due = task.dueDate ? new Date(task.dueDate).toLocaleDateString() : 'No deadline';
      const isMyTask = task.assignedTo?._id === user.id;

      const modal = openModal(`
        <div class="modal-header">
          <h3>📋 Task Details</h3>
          <button class="modal-close">×</button>
        </div>
        <div style="padding:0;">
          <div style="background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;margin-bottom:16px;">
            <div style="font-size:1.15rem;font-weight:700;color:var(--text-primary);margin-bottom:8px;">${task.title}</div>
            <div style="font-size:0.85rem;color:var(--text-secondary);line-height:1.6;">${task.description || 'No description provided.'}</div>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
            <div style="background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px;">
              <div style="font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px;">Status</div>
              <span class="badge badge-${task.status}">${task.status}</span>
            </div>
            <div style="background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px;">
              <div style="font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px;">Priority</div>
              <span class="badge badge-${task.priority || 'medium'}">${task.priority || 'medium'}</span>
            </div>
            <div style="background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px;">
              <div style="font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px;">Due Date</div>
              <div style="font-size:0.85rem;color:var(--text-primary);">📅 ${due}</div>
            </div>
            <div style="background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px;">
              <div style="font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px;">Assigned To</div>
              <div style="font-size:0.85rem;color:var(--text-primary);">${task.assignedTo?.name || 'Unassigned'}</div>
            </div>
          </div>

          ${isMyTask ? `
          <div style="margin-bottom:16px;">
            <label style="font-size:0.8rem;color:var(--text-muted);margin-bottom:6px;display:block;">Update Status</label>
            <select id="student-status-update" class="form-control">
              <option value="pending" ${task.status === 'pending' ? 'selected' : ''}>Pending</option>
              <option value="in-progress" ${task.status === 'in-progress' ? 'selected' : ''}>In Progress</option>
              <option value="completed" ${task.status === 'completed' ? 'selected' : ''}>Completed</option>
            </select>
          </div>
          <div style="display:flex;gap:10px;">
            <button class="btn btn-primary" id="btn-update-status" style="flex:1;">💾 Update Status</button>
            <button class="btn btn-secondary" id="btn-quick-upload-modal" style="flex:1;">📎 Upload File</button>
          </div>
          ` : ''}
        </div>
      `);

      if (isMyTask) {
        modal.querySelector('#btn-update-status').addEventListener('click', async () => {
          const newStatus = modal.querySelector('#student-status-update').value;
          try {
            await ApiClient.put(`/tasks/${task._id}`, { status: newStatus });
            if (newStatus === 'completed' && task.status !== 'completed') fireConfetti();
            showToast('success', 'Updated', 'Task status updated.');
            modal.remove();
            loadTasks();
          } catch (err) {
            showToast('error', 'Error', err.message);
          }
        });

        modal.querySelector('#btn-quick-upload-modal').addEventListener('click', () => {
          modal.remove();
          openQuickUpload(task);
        });
      }
    }

    // ── Quick Upload for Task ──
    function openQuickUpload(task) {
      const modal = openModal(`
        <div class="modal-header">
          <h3>📎 Upload File</h3>
          <button class="modal-close">×</button>
        </div>
        <div style="margin-bottom:12px;">
          <div style="font-size:0.85rem;color:var(--text-muted);">Uploading for task: <strong style="color:var(--text-primary);">${task.title}</strong></div>
          <div style="font-size:0.75rem;color:var(--text-muted);margin-top:4px;">Project: ${task.project?.name || 'Unknown'}</div>
        </div>
        <div class="upload-zone" id="quick-upload-zone" style="padding:30px;text-align:center;border:2px dashed var(--border);border-radius:var(--radius-md);cursor:pointer;transition:all 0.3s;">
          <div style="font-size:2rem;margin-bottom:8px;">📤</div>
          <div style="font-size:0.85rem;color:var(--text-secondary);">Click or drag file here</div>
          <div style="font-size:0.7rem;color:var(--text-muted);margin-top:4px;">PDF, Word, Excel, Images, ZIP — Max 20MB</div>
          <input type="file" id="quick-file-input" style="display:none">
        </div>
        <div id="quick-file-preview" style="display:none;margin-top:12px;"></div>
        <div id="quick-upload-progress" style="display:none;margin-top:12px;">
          <div class="progress-wrap">
            <div class="progress-bar"><div class="progress-fill" id="quick-progress-fill" style="width:0%;transition:width 0.3s;"></div></div>
          </div>
        </div>
        <button class="btn btn-primary" id="quick-upload-btn" style="width:100%;margin-top:16px;" disabled>📤 Upload</button>
      `);

      const zone = modal.querySelector('#quick-upload-zone');
      const fileInput = modal.querySelector('#quick-file-input');
      const preview = modal.querySelector('#quick-file-preview');
      const uploadBtn = modal.querySelector('#quick-upload-btn');
      let selectedFile = null;

      zone.addEventListener('click', () => fileInput.click());
      zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.style.borderColor = 'var(--accent)'; });
      zone.addEventListener('dragleave', () => { zone.style.borderColor = 'var(--border)'; });
      zone.addEventListener('drop', (e) => {
        e.preventDefault();
        zone.style.borderColor = 'var(--border)';
        if (e.dataTransfer.files[0]) pickFile(e.dataTransfer.files[0]);
      });
      fileInput.addEventListener('change', () => { if (fileInput.files[0]) pickFile(fileInput.files[0]); });

      function pickFile(f) {
        if (f.size > 20 * 1024 * 1024) { showToast('warning', 'Too large', 'Max 20MB'); return; }
        selectedFile = f;
        const sizeStr = f.size < 1024 ? f.size + ' B' : f.size < 1048576 ? (f.size/1024).toFixed(1) + ' KB' : (f.size/1048576).toFixed(1) + ' MB';
        preview.style.display = 'block';
        preview.innerHTML = `<div style="display:flex;align-items:center;gap:10px;padding:10px;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:var(--radius-md);">
          <span style="font-size:1.3rem;">📄</span>
          <div style="flex:1;"><div style="font-size:0.85rem;font-weight:600;color:var(--text-primary);">${f.name}</div><div style="font-size:0.7rem;color:var(--text-muted);">${sizeStr}</div></div>
          <span style="color:var(--emerald);">✓</span>
        </div>`;
        uploadBtn.disabled = false;
      }

      uploadBtn.addEventListener('click', async () => {
        if (!selectedFile) return;
        const projectId = task.project?._id || task.project;
        if (!projectId) { showToast('error', 'Error', 'No project associated'); return; }

        uploadBtn.disabled = true;
        uploadBtn.innerHTML = '<span class="spinner"></span> Uploading...';
        modal.querySelector('#quick-upload-progress').style.display = 'block';
        modal.querySelector('#quick-progress-fill').style.width = '50%';

        const fd = new FormData();
        fd.append('file', selectedFile);
        fd.append('projectId', projectId);
        fd.append('description', `Uploaded for task: ${task.title}`);

        try {
          await ApiClient.upload('/files/upload', fd);
          modal.querySelector('#quick-progress-fill').style.width = '100%';
          showToast('success', 'Uploaded!', `${selectedFile.name} uploaded successfully.`);
          setTimeout(() => modal.remove(), 500);
        } catch (err) {
          showToast('error', 'Upload Failed', err.message);
          uploadBtn.disabled = false;
          uploadBtn.innerHTML = '📤 Upload';
        }
      });
    }

    // ── Setup listeners ──
    const newTaskBtn = document.getElementById('new-task-btn');
    if (user.role === 'faculty') {
      newTaskBtn.addEventListener('click', () => openTaskModal());
    } else {
      newTaskBtn.style.display = 'none'; // Students can't create tasks
    }
    document.getElementById('project-filter').addEventListener('change', loadTasks);
    document.getElementById('user-filter').addEventListener('change', renderTasks);
    document.getElementById('search-tasks').addEventListener('input', renderTasks);

    setupKanbanDragDrop();

    // ── Socket.IO Real-time ──
    const initSocket = async () => {
      const loadScript = () => new Promise(resolve => {
        if (window.io) { resolve(); return; }
        const s = document.createElement('script');
        s.src = '/socket.io/socket.io.js';
        s.onload = resolve;
        document.head.appendChild(s);
      });
      await loadScript();

      const socket = io();
      currentProjects.forEach(p => {
        socket.emit('join:project', { projectId: p._id, userId: user.id, userName: user.name });
      });

      socket.on('task:created', (data) => {
        if (window.addNotification && data.task?.assignedTo !== user.id) {
           window.addNotification({ action: 'task_created', user: { name: 'Someone' }, metadata: { title: data.task?.title }, project: { name: 'Project' }, createdAt: new Date() });
        }
        loadTasks();
      });
      socket.on('task:updated', (data) => {
        if (window.addNotification && data.updatedBy !== user.name) {
           window.addNotification({ action: 'task_updated', user: { name: data.updatedBy }, metadata: { title: data.task?.title }, project: { name: 'Project' }, createdAt: new Date() });
        }
        loadTasks();
      });
      socket.on('task:deleted', loadTasks);
    };

    // Initialize
    (async () => {
      await loadProjects();
      await loadTasks();
      await initSocket();
    })();
  </script>
</body>
</html>
