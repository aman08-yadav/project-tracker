<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProjectHub — Loading</title>
  <style>
    body {
      margin: 0; padding: 0; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: radial-gradient(circle at center, #0d0d2b 0%, #07071a 100%);
      color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .loader {
      width: 50px; height: 50px;
      border: 4px solid rgba(255,255,255,0.1);
      border-left-color: #7c3aed;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .brand { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
    .status { margin-top: 10px; font-size: 0.9rem; color: #9ca3af; }
  </style>
  <script>
    // Simulate a brief loading screen so the user knows the app is starting up
    setTimeout(() => {
      if (localStorage.getItem('token')) {
        window.location.href = '/html/dashboard.html';
      } else {
        window.location.href = '/html/login.html';
      }
    }, 800); // 800ms minimum splash screen to hide blank transition
  </script>
</head>
<body>
  <div class="loader"></div>
  <div class="brand">ProjectHub</div>
  <div class="status" id="loading">Loading ProjectHub... please wait</div>
</body>
</html>
