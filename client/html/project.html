<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — ProjectHub</title>
  <meta name="description" content="Manage your teams, view project details, and chat with members.">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    .avatar-stack { display: flex; align-items: center; margin-left: 10px; }
    .avatar-stack .member-avatar { 
      width: 32px; height: 32px; border: 2px solid var(--bg-card); 
      margin-left: -10px; transition: transform 0.2s ease; font-size: 0.7rem;
    }
    .avatar-stack .member-avatar:hover { transform: translateY(-3px); z-index: 10; border-color: var(--accent); }
    .avatar-stack-more {
      width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700;
      margin-left: -10px; border: 2px solid var(--bg-card); z-index: 1;
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <div class="main-content" id="main-content">
      
      <!-- List View -->
      <div id="view-projects">
        <div class="page-header animate-in flex-between">
          <div>
            <h1>Projects</h1>
            <p class="text-muted">Manage your teams and collaborate. (Shortcut: P)</p>
          </div>
          <button class="btn btn-primary faculty-only" id="new-project-btn" style="display:none;">
            <span>➕</span> New Project
          </button>
        </div>

        <div class="filter-bar animate-in">
          <div class="search-input-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-projects" class="form-control" placeholder="Search projects...">
          </div>
        </div>

        <div class="grid-3 animate-in" id="projects-grid">
          <div class="skeleton" style="height:220px;"></div>
          <div class="skeleton" style="height:220px;"></div>
          <div class="skeleton" style="height:220px;"></div>
        </div>
      </div>

      <!-- Detail View -->
      <div id="view-project-detail" style="display:none;">
        <button class="btn btn-ghost animate-in" id="back-btn" style="margin-bottom:20px;padding:0;"><span style="font-size:1.2rem;">←</span> Back to Projects</button>
        
        <div class="page-header animate-in flex-between" style="align-items:flex-start;">
          <div>
            <h1 id="det-title" style="margin-bottom:8px;">Project Name</h1>
            <p class="text-muted" id="det-desc">Project description goes here.</p>
            <div style="display:flex;align-items:center;gap:16px;margin-top:16px;">
              <span class="badge badge-in-progress">Active</span>
              <span class="text-sm text-muted" id="det-meta">Created on...</span>
            </div>
          </div>
          <div class="avatar-stack" id="det-avatars">
            <!-- Avatars injected here -->
          </div>
        </div>

        <div class="grid-2" style="gap:24px; align-items:start;">
          <!-- Left Col -->
          <div style="display:flex; flex-direction:column; gap:24px;">
            <!-- Progress -->
            <div class="glass-card animate-in">
              <h3 style="font-size:1rem;margin-bottom:16px;">Project Progress</h3>
              <div class="progress-wrap" style="margin:0;">
                <div class="progress-label">
                  <span>Completion</span>
                  <span id="det-progress-pct">0%</span>
                </div>
                <div class="progress-bar">
                  <div class="progress-fill" id="det-progress-bar" style="width:0%"></div>
                </div>
              </div>
              <div style="display:flex;justify-content:space-between;margin-top:16px;font-size:0.8rem;">
                <div style="text-align:center;"><strong style="color:var(--text-primary);font-size:1.1rem;display:block;" id="det-stat-done">0</strong> <span class="text-muted">Done</span></div>
                <div style="text-align:center;"><strong style="color:var(--text-primary);font-size:1.1rem;display:block;" id="det-stat-wip">0</strong> <span class="text-muted">In Progress</span></div>
                <div style="text-align:center;"><strong style="color:var(--text-primary);font-size:1.1rem;display:block;" id="det-stat-pending">0</strong> <span class="text-muted">Pending</span></div>
              </div>
            </div>

            <!-- Members -->
            <div class="glass-card animate-in">
              <div class="flex-between" style="margin-bottom:16px;">
                <h3 style="font-size:1rem;">Team Members</h3>
                <button class="btn btn-ghost btn-sm faculty-only" id="add-member-btn" style="display:none;">+ Add</button>
              </div>
              <div style="display:flex;flex-direction:column;gap:10px;" id="det-members">
                <!-- Members injected here -->
              </div>
            </div>
          </div>

          <!-- Right Col: Team Chat -->
          <div class="chat-panel animate-in">
            <div class="chat-header">
              <div style="display:flex;align-items:center;gap:8px;">
                <span class="chat-online-dot"></span>
                <span style="font-weight:600;font-size:0.95rem;">Team Chat</span>
              </div>
              <span class="text-xs text-muted" style="margin-left:auto;">Real-time</span>
            </div>
            <div class="chat-messages" id="chat-messages">
              <p class="text-muted text-sm" style="text-align:center;margin-top:auto;margin-bottom:auto;">Loading messages...</p>
            </div>
            <div class="typing-indicator" id="typing-indicator"></div>
            <form class="chat-input-row" id="chat-form">
              <input type="text" id="chat-input" class="form-control" placeholder="Type a message..." required autocomplete="off">
              <button type="submit" class="btn btn-primary btn-icon" title="Send">➤</button>
            </form>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script type="module">
    import { ApiClient } from '../js/api.js';
    import { requireAuth, buildSidebar, buildTopbar, showToast, openModal, avatarInitials, formatDate, timeAgo } from '../js/ui.js';

    const user = requireAuth();
    if (!user) throw new Error('Not authenticated');

    buildSidebar('projects');
    buildTopbar('Projects');

    const isFaculty = user.role === 'faculty';
    if (isFaculty) {
      document.querySelectorAll('.faculty-only').forEach(el => el.style.display = 'inline-flex');
    }

    let allProjects = [];
    let currentProject = null;
    let socket = null;

    // ── Grid View ──
    async function loadProjects() {
      try {
        const res = await ApiClient.get('/projects');
        allProjects = res.projects || [];
        renderProjects();
      } catch (err) {
        showToast('error', 'Error', 'Failed to load projects.');
      }
    }

    function renderProjects() {
      const q = document.getElementById('search-projects').value.toLowerCase();
      const filtered = allProjects.filter(p => p.name.toLowerCase().includes(q) || (p.description||'').toLowerCase().includes(q));
      
      const grid = document.getElementById('projects-grid');
      if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="icon">📁</div><h3>No projects found</h3><p>Create a new project or adjust your search.</p></div>`;
        return;
      }

      // Concurrently fetch progress for all filtered projects
      grid.innerHTML = '';
      filtered.forEach(p => {
        const card = document.createElement('div');
        card.className = 'glass-card project-card';
        card.style.cursor = 'pointer';
        
        // Members stack limit
        const limit = 4;
        const visibleMembers = p.members.slice(0, limit);
        const extraCount = p.members.length - limit;
        
        const avatarHtml = visibleMembers.map((m, i) => {
          const mu = m.user || m;
          return `
          <div class="member-avatar" style="z-index:${limit - i};" title="${mu.name || ''}">
            ${mu.avatar ? `<img src="${mu.avatar}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">` : avatarInitials(mu.name || 'U')}
          </div>
        `}).join('') + (extraCount > 0 ? `<div class="avatar-stack-more">+${extraCount}</div>` : '');

        card.innerHTML = `
          <h3 style="font-size:1.1rem;margin-bottom:8px;color:var(--text-primary);">${p.name}</h3>
          <p class="text-sm text-muted" style="margin-bottom:20px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${p.description || 'No description provided.'}</p>
          
          <div class="avatar-stack" style="margin-left:10px;margin-bottom:20px;">
            ${avatarHtml}
          </div>
          
          <div class="progress-wrap" style="margin:0;padding-top:16px;border-top:1px solid rgba(255,255,255,0.05);">
            <div class="progress-label">
              <span>Progress</span>
              <span id="pct-${p._id}">...</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" id="bar-${p._id}" style="width:0%"></div>
            </div>
          </div>
        `;
        
        card.addEventListener('click', () => showProjectDetail(p));
        grid.appendChild(card);
        
        // Async fetch progress
        ApiClient.get(`/analytics/project/${p._id}`).then(res => {
          const tTasks = res.analytics.totalTasks || 0;
          const cTasks = res.analytics.completedTasks || 0;
          const pct = tTasks > 0 ? Math.round((cTasks / tTasks) * 100) : 0;
          const bar = document.getElementById(`bar-${p._id}`);
          const pctEl = document.getElementById(`pct-${p._id}`);
          if (bar) bar.style.width = pct + '%';
          if (pctEl) pctEl.textContent = pct + '%';
        }).catch(()=>{});
      });
    }

    // ── Detail View ──
    async function showProjectDetail(p) {
      currentProject = p;
      document.getElementById('view-projects').style.display = 'none';
      document.getElementById('view-project-detail').style.display = 'block';
      
      document.getElementById('det-title').textContent = p.name;
      document.getElementById('det-desc').textContent = p.description || 'No description.';
      document.getElementById('det-meta').textContent = `Created ${formatDate(p.createdAt)}`;
      
      // Render members
      const limit = 6;
      const visibleMembers = p.members.slice(0, limit);
      document.getElementById('det-avatars').innerHTML = visibleMembers.map((m, i) => {
        const mu = m.user || m;
        return `
        <div class="member-avatar" style="z-index:${limit - i};" title="${mu.name || ''} (${m.role})">
          ${mu.avatar ? `<img src="${mu.avatar}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">` : avatarInitials(mu.name || 'U')}
        </div>
      `}).join('');
      
      document.getElementById('det-members').innerHTML = p.members.map(m => {
        const mu = m.user || m;
        return `
        <div class="member-card" style="padding:10px 14px;">
          <div class="member-avatar" style="width:36px;height:36px;font-size:0.8rem;">
            ${mu.avatar ? `<img src="${mu.avatar}" alt="">` : avatarInitials(mu.name || 'U')}
          </div>
          <div class="member-info">
            <div class="member-name" style="font-size:0.85rem;">${mu.name || 'Unknown'}</div>
            <div class="member-email" style="font-size:0.7rem;">${mu.email || ''}</div>
          </div>
          <span class="badge badge-${m.role === 'faculty' ? 'faculty' : 'student'}" style="font-size:0.6rem;">${m.role}</span>
        </div>
      `}).join('');

      // Fetch analytics for progress
      try {
        const stats = await ApiClient.get(`/analytics/project/${p._id}`);
        const a = stats.analytics;
        const total = a.totalTasks || 0;
        const done = a.completedTasks || 0;
        const pct = total > 0 ? Math.round((done / total) * 100) : 0;
        
        document.getElementById('det-stat-done').textContent = done;
        document.getElementById('det-stat-wip').textContent = a.inProgressTasks || 0;
        document.getElementById('det-stat-pending').textContent = a.pendingTasks || 0;
        
        setTimeout(() => {
          document.getElementById('det-progress-bar').style.width = pct + '%';
          document.getElementById('det-progress-pct').textContent = pct + '%';
        }, 100);
      } catch (err) {
        console.error(err);
      }

      // Chat logic
      initChat();
    }

    document.getElementById('back-btn').addEventListener('click', () => {
      currentProject = null;
      document.getElementById('view-project-detail').style.display = 'none';
      document.getElementById('view-projects').style.display = 'block';
      if (socket) socket.disconnect();
    });

    document.getElementById('search-projects').addEventListener('input', renderProjects);

    // ── Create Project Modal ──
    document.getElementById('new-project-btn').addEventListener('click', () => {
      const modal = openModal(`
        <div class="modal-header">
          <h3>Create New Project</h3>
          <button class="modal-close">×</button>
        </div>
        <form id="proj-form">
          <div class="form-group">
            <label>Project Name</label>
            <input type="text" id="p-name" class="form-control" required maxlength="100" placeholder="e.g. AI Student Assistant">
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea id="p-desc" class="form-control" rows="3" maxlength="500" placeholder="Briefly describe the project..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;margin-top:20px;">Create Project</button>
        </form>
      `);

      modal.querySelector('#proj-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        try {
          await ApiClient.post('/projects', {
            name: modal.querySelector('#p-name').value,
            description: modal.querySelector('#p-desc').value
          });
          showToast('success', 'Success', 'Project created successfully.');
          modal.remove();
          loadProjects();
        } catch (err) {
          showToast('error', 'Error', err.message);
        }
      });
    });

    // ── Add Member Modal ──
    document.getElementById('add-member-btn').addEventListener('click', async () => {
      if (!currentProject) return;
      
      // Fetch all students to populate a dropdown
      let allStudents = [];
      try {
        const res = await ApiClient.get('/projects/students');
        allStudents = res.users || [];
      } catch (e) {
        // fallback: fetch all users
        try {
          const res = await ApiClient.get('/users');
          allStudents = (res.users || []).filter(u => u.role === 'student');
        } catch (_) {}
      }

      // Filter out already-added members
      const existingIds = currentProject.members.map(m => (m.user?._id || m._id || m.user)?.toString());
      const available = allStudents.filter(s => !existingIds.includes(s._id.toString()));

      const modal = openModal(`
        <div class="modal-header">
          <h3>Add Member to Team</h3>
          <button class="modal-close">×</button>
        </div>
        <form id="add-member-form">
          <div class="form-group">
            <label>Select Student</label>
            <select id="m-student" class="form-control" required>
              <option value="">Choose a student...</option>
              ${available.length > 0 
                ? available.map(s => `<option value="${s._id}">${s.name} (${s.email})</option>`).join('')
                : '<option value="" disabled>No available students</option>'}
            </select>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;margin-top:20px;" ${available.length === 0 ? 'disabled' : ''}>Add to Project</button>
        </form>
      `);

      modal.querySelector('#add-member-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const memberId = modal.querySelector('#m-student').value;
        if (!memberId) return showToast('error', 'Error', 'Please select a student.');
        try {
          await ApiClient.post(`/projects/${currentProject._id}/members`, { memberId });
          showToast('success', 'Added', 'Member added to project.');
          modal.remove();
          // refresh details
          const res = await ApiClient.get(`/projects/${currentProject._id}`);
          showProjectDetail(res.project);
        } catch (err) {
          showToast('error', 'Error', err.message);
        }
      });
    });

    // ── Chat Logic ──
    async function initChat() {
      const container = document.getElementById('chat-messages');
      container.innerHTML = '<div class="spinner" style="margin:auto;"></div>';
      
      const loadScript = () => new Promise(resolve => {
        if (window.io) { resolve(); return; }
        const s = document.createElement('script');
        s.src = '/socket.io/socket.io.js';
        s.onload = resolve;
        document.head.appendChild(s);
      });
      await loadScript();

      if (socket) socket.disconnect();
      socket = io();

      socket.emit('join:project', { 
        projectId: currentProject._id, 
        userId: user.id, 
        userName: user.name 
      });

      // Load history
      try {
        const res = await ApiClient.get(`/projects/${currentProject._id}/chat`);
        renderMessages(res.messages || []);
      } catch (err) {
        container.innerHTML = `<p class="text-muted text-sm" style="text-align:center;margin-top:auto;margin-bottom:auto;">Error loading messages.</p>`;
      }

      // Handlers
      socket.on('chat:message', (msg) => {
        appendMessage(msg);
      });

      let typingTimeout;
      const tInd = document.getElementById('typing-indicator');
      socket.on('chat:typing', (data) => {
        if (data.userId === user.id) return;
        tInd.textContent = `${data.userName} is typing...`;
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => tInd.textContent = '', 2000);
      });

      // Inputs
      const input = document.getElementById('chat-input');
      input.addEventListener('input', () => {
        socket.emit('chat:typing', { projectId: currentProject._id, userId: user.id, userName: user.name });
      });

      const form = document.getElementById('chat-form');
      // replace clone to remove old listeners
      const newForm = form.cloneNode(true);
      form.parentNode.replaceChild(newForm, form);
      
      newForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const text = newForm.querySelector('#chat-input').value.trim();
        if (!text) return;
        
        socket.emit('chat:message', {
          projectId: currentProject._id,
          senderId: user.id,
          senderName: user.name,
          text
        });
        
        newForm.querySelector('#chat-input').value = '';
      });
    }

    function renderMessages(msgs) {
      const container = document.getElementById('chat-messages');
      if (msgs.length === 0) {
        container.innerHTML = `<p class="text-muted text-sm" style="text-align:center;margin-top:auto;margin-bottom:auto;">Start the conversation! 👋</p>`;
        return;
      }
      container.innerHTML = '';
      msgs.forEach(appendMessage);
    }

    function appendMessage(msg) {
      const container = document.getElementById('chat-messages');
      if (container.querySelector('.text-muted')) container.innerHTML = '';
      
      const isOwn = msg.sender && (msg.sender._id === user.id || msg.sender === user.id);
      const sName = msg.senderName || (msg.sender && msg.sender.name) || 'Unknown';
      const sAvatar = msg.senderAvatar || (msg.sender && msg.sender.avatar);
      
      const el = document.createElement('div');
      el.className = `chat-message ${isOwn ? 'own' : ''}`;
      
      const avatarHtml = `
        <div class="chat-msg-avatar" title="${sName}">
          ${sAvatar ? `<img src="${sAvatar}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">` : avatarInitials(sName)}
        </div>
      `;
      
      const escapeHtml = (unsafe) => {
        return String(unsafe)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      };

      el.innerHTML = `
        ${isOwn ? '' : avatarHtml}
        <div class="chat-msg-body">
          ${isOwn ? '' : `<div class="chat-msg-name">${escapeHtml(sName)}</div>`}
          <div class="chat-bubble">${escapeHtml(msg.text)}</div>
          <div class="chat-msg-time">${new Date(msg.createdAt || Date.now()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
        </div>
      `;
      
      container.appendChild(el);
      container.scrollTop = container.scrollHeight;
    }

    // Init
    loadProjects();
  </script>
</body>
</html>
