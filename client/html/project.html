<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — ProjectHub</title>
  <meta name="description" content="Manage and assign projects to your team.">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
  <div id="toast-container"></div>
  <div class="app-layout">
    <div class="main-content">
      <div class="page-header animate-in flex-between">
        <div>
          <h1>Projects</h1>
          <p class="text-muted" id="projects-subtitle">Manage your teams and projects</p>
        </div>
        <div style="display:flex;gap:10px;" id="header-actions">
          <!-- Injected based on role -->
        </div>
      </div>

      <!-- Faculty only: Search bar -->
      <div class="filter-bar" id="project-filter-bar" style="display:none;">
        <div class="search-input-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="project-search" class="form-control" placeholder="Search projects…">
        </div>
        <select id="filter-status" class="form-control" style="width:auto;min-width:140px;">
          <option value="">All Status</option>
          <option value="active">Active</option>
          <option value="completed">Completed</option>
          <option value="archived">Archived</option>
        </select>
      </div>

      <!-- Projects Grid -->
      <div class="grid-2" id="projects-grid">
        <div class="skeleton" style="height:220px;border-radius:var(--radius-lg);"></div>
        <div class="skeleton" style="height:220px;border-radius:var(--radius-lg);"></div>
      </div>

      <!-- Project Detail Panel (shown when project selected) -->
      <div id="project-detail" style="display:none; margin-top:24px;">
        <div class="glass-card" style="margin-bottom:20px;">
          <div class="flex-between" style="margin-bottom:20px;">
            <div>
              <h2 id="proj-name" style="font-size:1.4rem;"></h2>
              <p id="proj-desc" class="text-muted text-sm" style="margin-top:4px;"></p>
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
              <span id="proj-status-badge" class="badge"></span>
              <button class="btn btn-ghost btn-sm" id="close-detail">✕ Close</button>
            </div>
          </div>
          <div class="grid-3" style="margin-bottom:20px;">
            <div style="text-align:center;"><div style="font-size:1.5rem;font-weight:700;color:var(--accent-light);" id="proj-stat-members">0</div><div style="font-size:0.75rem;color:var(--text-muted);">Members</div></div>
            <div style="text-align:center;"><div style="font-size:1.5rem;font-weight:700;color:var(--cyan);" id="proj-stat-tasks">0</div><div style="font-size:0.75rem;color:var(--text-muted);">Total Tasks</div></div>
            <div style="text-align:center;"><div style="font-size:1.5rem;font-weight:700;color:var(--emerald);" id="proj-stat-done">0</div><div style="font-size:0.75rem;color:var(--text-muted);">Completed</div></div>
          </div>
          <div class="progress-wrap">
            <div class="progress-label"><span>Completion</span><span id="proj-pct">0%</span></div>
            <div class="progress-bar"><div class="progress-fill" id="proj-progress" style="width:0%"></div></div>
          </div>
        </div>

        <div class="grid-2" style="gap:20px;">
          <!-- Members -->
          <div class="glass-card">
            <div class="flex-between" style="margin-bottom:16px;">
              <h3 style="font-size:1rem;">Team Members</h3>
              <button class="btn btn-primary btn-sm faculty-only" id="add-member-btn" style="display:none;">➕ Add Member</button>
            </div>
            <div id="members-list" style="display:flex;flex-direction:column;gap:8px;"></div>
          </div>

          <!-- Chat -->
          <div class="chat-panel">
            <div class="chat-header">
              <div class="chat-online-dot"></div>
              <span style="font-size:0.9rem;font-weight:600;">Project Chat</span>
              <span id="online-count" style="font-size:0.75rem;color:var(--text-muted);margin-left:auto;">— online</span>
            </div>
            <div class="chat-messages" id="chat-messages"></div>
            <div class="typing-indicator" id="typing-indicator"></div>
            <div class="chat-input-row">
              <input type="text" id="chat-input" class="form-control" placeholder="Type a message…" style="flex:1;">
              <button class="btn btn-primary btn-sm" id="send-msg-btn">Send</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { ApiClient } from '../js/api.js';
    import { requireAuth, buildSidebar, buildTopbar, showToast, initToast, openModal, avatarInitials, timeAgo } from '../js/ui.js';

    initToast();
    const user = requireAuth(); if (!user) throw new Error();
    buildSidebar('projects');
    buildTopbar('Projects');

    const isFaculty = user.role === 'faculty';
    let socket = null;
    let currentProjectId = null;
    let typingTimer = null;
    let allProjects = [];

    // ── Setup header buttons based on role ───────────────────
    const headerActions = document.getElementById('header-actions');
    if (isFaculty) {
      headerActions.innerHTML = `
        <button class="btn btn-primary" id="create-btn">➕ New Project</button>
      `;
      document.getElementById('project-filter-bar').style.display = 'flex';
      document.getElementById('projects-subtitle').textContent = 'Create and assign projects to students';
    } else {
      headerActions.innerHTML = `
        <button class="btn btn-secondary" id="join-btn">🔗 Join Project</button>
      `;
      document.getElementById('projects-subtitle').textContent = 'Projects assigned to you';
    }

    // Show faculty-only elements
    if (isFaculty) {
      document.querySelectorAll('.faculty-only').forEach(el => el.style.display = 'flex');
    }

    // ── Load Projects ────────────────────────────────────────
    async function loadProjects() {
      const grid = document.getElementById('projects-grid');
      try {
        const res = await ApiClient.get('/projects');
        allProjects = res.projects || [];
        renderProjects(allProjects);
      } catch (err) {
        grid.innerHTML = `<p class="text-muted">Failed to load projects.</p>`;
      }
    }

    function renderProjects(projects) {
      const grid = document.getElementById('projects-grid');
      if (projects.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1;">
            <div class="icon">📁</div>
            <h3>${isFaculty ? 'No projects yet' : 'No projects assigned'}</h3>
            <p>${isFaculty ? 'Create your first project using the button above' : 'Ask your teacher to assign you to a project'}</p>
          </div>`;
        return;
      }
      const statusColors = { active: 'cyan', completed: 'emerald', archived: 'text-muted' };
      grid.innerHTML = projects.map(p => {
        const ownerName = p.owner?.name || 'Unknown';
        const memberCount = p.members?.length || 0;
        const statusColor = statusColors[p.status] || 'cyan';
        return `
          <div class="glass-card project-card" style="cursor:pointer;" onclick="openProject('${p._id}')">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
              <div style="font-size:2rem;">📁</div>
              <span class="badge badge-${statusColor}" style="font-size:0.7rem;">${p.status}</span>
            </div>
            <h3 style="font-size:1.05rem;margin-bottom:6px;">${p.name}</h3>
            <p style="font-size:0.82rem;color:var(--text-secondary);margin-bottom:12px;">${p.description || 'No description'}</p>
            <p style="font-size:0.72rem;color:var(--text-muted);margin-bottom:12px;">👨‍🏫 ${ownerName}</p>
            <div style="display:flex;align-items:center;justify-content:space-between;">
              <div style="display:flex;align-items:center;gap:2px;">
                ${(p.members || []).slice(0,4).map(m => `
                  <div style="width:28px;height:28px;border-radius:50%;background:var(--gradient-brand);display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:700;color:white;border:2px solid var(--bg-secondary);margin-left:-6px;">${avatarInitials(m.user?.name || '')}</div>
                `).join('')}
                ${memberCount > 4 ? `<div style="width:28px;height:28px;border-radius:50%;background:var(--bg-card);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:0.65rem;color:var(--text-muted);margin-left:-6px;">+${memberCount - 4}</div>` : ''}
              </div>
              <span style="font-size:0.78rem;color:var(--text-muted);">${memberCount} members</span>
            </div>
          </div>`;
      }).join('');
    }

    // Filter projects
    document.getElementById('project-search')?.addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      const status = document.getElementById('filter-status')?.value;
      let filtered = allProjects.filter(p => p.name.toLowerCase().includes(q) || (p.description||'').toLowerCase().includes(q));
      if (status) filtered = filtered.filter(p => p.status === status);
      renderProjects(filtered);
    });
    document.getElementById('filter-status')?.addEventListener('change', (e) => {
      const q = document.getElementById('project-search')?.value.toLowerCase() || '';
      const status = e.target.value;
      let filtered = allProjects.filter(p => p.name.toLowerCase().includes(q));
      if (status) filtered = filtered.filter(p => p.status === status);
      renderProjects(filtered);
    });

    // ── Open Project Detail ───────────────────────────────────
    window.openProject = async (projectId) => {
      currentProjectId = projectId;
      document.getElementById('project-detail').style.display = 'block';
      document.getElementById('project-detail').scrollIntoView({ behavior: 'smooth' });

      // Show add-member btn only for faculty
      const addMemberBtn = document.getElementById('add-member-btn');
      if (addMemberBtn) addMemberBtn.style.display = isFaculty ? 'flex' : 'none';

      try {
        const res = await ApiClient.get(`/projects/${projectId}`);
        const p = res.project;
        document.getElementById('proj-name').textContent = p.name;
        document.getElementById('proj-desc').textContent = p.description || '';
        document.getElementById('proj-stat-members').textContent = p.members?.length || 0;

        const statusBadge = document.getElementById('proj-status-badge');
        const statusColors = { active: 'cyan', completed: 'emerald', archived: 'text-muted' };
        statusBadge.textContent = p.status;
        statusBadge.className = `badge badge-${statusColors[p.status] || 'cyan'}`;

        // Load task stats
        try {
          const ta = await ApiClient.get(`/analytics/project/${projectId}`);
          const stats = ta.analytics || {};
          const total = stats.totalTasks || 0;
          const done  = stats.completedTasks || 0;
          const pct   = total > 0 ? Math.round((done / total) * 100) : 0;
          document.getElementById('proj-stat-tasks').textContent = total;
          document.getElementById('proj-stat-done').textContent = done;
          document.getElementById('proj-pct').textContent = `${pct}%`;
          setTimeout(() => { document.getElementById('proj-progress').style.width = `${pct}%`; }, 100);
        } catch (_) {}

        // ── Members list — access m.user (nested object) ──
        const ml = document.getElementById('members-list');
        ml.innerHTML = (p.members || []).map(m => {
          // m = { user: { _id, name, email, avatar, role }, role, joinedAt }
          const memberUser = m.user || {};
          const memberName = memberUser.name || 'Unknown';
          const memberEmail = memberUser.email || '';
          const memberRole = memberUser.role || m.role || 'student';
          const memberId = memberUser._id || '';
          const isOwner = p.owner?._id === memberId || p.owner === memberId;

          return `
            <div class="member-card">
              <div class="member-avatar">${memberUser.avatar ? `<img src="${memberUser.avatar}" alt="">` : avatarInitials(memberName)}</div>
              <div class="member-info">
                <div class="member-name">${memberName} ${isOwner ? '👑' : ''}</div>
                <div class="member-email">${memberEmail}</div>
              </div>
              <span class="badge badge-${memberRole === 'faculty' ? 'violet' : 'cyan'}">${memberRole}</span>
              ${isFaculty && !isOwner && memberId ? `
                <button class="btn btn-danger btn-sm" title="Remove" onclick="removeMember('${projectId}','${memberId}')">✕</button>
              ` : ''}
            </div>`;
        }).join('');
      } catch (err) {
        showToast('error', 'Error', 'Failed to load project details');
      }

      // Connect Socket.IO
      initSocket(projectId);
    };

    // ── Socket.IO Chat ────────────────────────────────────────
    function initSocket(projectId) {
      if (socket) { socket.disconnect(); }
      const existing = document.querySelector('script[src="/socket.io/socket.io.js"]');
      const loadSocket = () => {
        socket = io();
        socket.emit('join:project', { projectId, userId: user.id, userName: user.name });

        socket.on('chat:message', ({ message, user: sender, timestamp }) => {
          appendMessage(sender, message, timestamp, sender.id === user.id);
        });
        socket.on('chat:typing', ({ userName, isTyping }) => {
          document.getElementById('typing-indicator').textContent = isTyping ? `${userName} is typing…` : '';
        });
        socket.on('online:members', (members) => {
          document.getElementById('online-count').textContent = `${members.length} online`;
        });
        socket.on('user:joined', ({ userName }) => showToast('info', 'User joined', `${userName} joined the project`));
        socket.on('task:created', ({ task }) => showToast('info', '📝 New Task', `"${task.title}" was added`));
        socket.on('task:updated', ({ task, newStatus }) => showToast('info', '🔄 Task Updated', `${task.title} → ${newStatus || task.status}`));
        socket.on('notification', ({ message }) => showToast('info', '🔔 Notification', message));
      };
      if (!existing) {
        const script = document.createElement('script');
        script.src = '/socket.io/socket.io.js';
        script.onload = loadSocket;
        document.head.appendChild(script);
      } else {
        loadSocket();
      }
    }

    function appendMessage(sender, message, timestamp, isOwn) {
      const msgs = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = `chat-message ${isOwn ? 'own' : ''}`;
      div.innerHTML = `
        <div class="chat-msg-avatar">${avatarInitials(sender.name || 'U')}</div>
        <div class="chat-msg-body">
          ${!isOwn ? `<div class="chat-msg-name">${sender.name}</div>` : ''}
          <div class="chat-bubble">${escapeHTML(message)}</div>
          <div class="chat-msg-time">${new Date(timestamp).toLocaleTimeString()}</div>
        </div>
      `;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function escapeHTML(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    document.getElementById('send-msg-btn').addEventListener('click', sendMessage);
    document.getElementById('chat-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    document.getElementById('chat-input').addEventListener('input', () => {
      if (!socket || !currentProjectId) return;
      socket.emit('chat:typing', { projectId: currentProjectId, userName: user.name, isTyping: true });
      clearTimeout(typingTimer);
      typingTimer = setTimeout(() => socket.emit('chat:typing', { projectId: currentProjectId, userName: user.name, isTyping: false }), 2000);
    });

    function sendMessage() {
      const input = document.getElementById('chat-input');
      const msg = input.value.trim();
      if (!msg || !socket || !currentProjectId) return;
      socket.emit('chat:message', { projectId: currentProjectId, message: msg, user: { id: user.id, name: user.name } });
      appendMessage({ name: user.name, id: user.id }, msg, new Date(), true);
      input.value = '';
    }

    // ── Remove Member ──────────────────────────────────────────
    window.removeMember = async (projectId, memberId) => {
      if (!confirm('Remove this member from the project?')) return;
      try {
        await ApiClient.delete(`/projects/${projectId}/members/${memberId}`);
        showToast('success', 'Removed', 'Member removed from project');
        openProject(projectId);
      } catch (err) { showToast('error', 'Error', err.message); }
    };

    // ── Add Member Modal (Faculty) ─────────────────────────────
    document.getElementById('add-member-btn')?.addEventListener('click', async () => {
      let usersHTML = '<option value="">— Select student —</option>';
      try {
        const res = await ApiClient.get('/users');
        (res.users || [])
          .filter(u => u.role === 'student')
          .forEach(u => { usersHTML += `<option value="${u._id}">${u.name} (${u.email})</option>`; });
      } catch (_) {}

      const overlay = openModal(`
        <div class="modal-header"><h3>Add Member to Project</h3><button class="modal-close">×</button></div>
        <div class="form-group"><label>Select Student</label><select id="member-select" class="form-control">${usersHTML}</select></div>
        <button class="btn btn-primary" style="width:100%" id="add-member-submit">➕ Add to Project</button>
      `);
      overlay.querySelector('#add-member-submit').addEventListener('click', async () => {
        const memberId = overlay.querySelector('#member-select').value;
        if (!memberId) return showToast('warning', 'Required', 'Please select a student');
        try {
          await ApiClient.post(`/projects/${currentProjectId}/members`, { memberId });
          showToast('success', 'Added!', 'Student added to project');
          overlay.remove();
          openProject(currentProjectId);
        } catch (err) { showToast('error', 'Error', err.message); }
      });
    });

    // ── Create Project Modal (Faculty) ─────────────────────────
    document.getElementById('create-btn')?.addEventListener('click', () => {
      const overlay = openModal(`
        <div class="modal-header"><h3>Create New Project</h3><button class="modal-close">×</button></div>
        <div class="form-group"><label>Project Name *</label><input type="text" id="proj-name-inp" class="form-control" placeholder="e.g. INT 219 Web Project" required></div>
        <div class="form-group"><label>Description</label><textarea id="proj-desc-inp" class="form-control" rows="3" placeholder="What is this project about?" style="resize:vertical;"></textarea></div>
        <button class="btn btn-primary" style="width:100%" id="create-proj-submit">🚀 Create Project</button>
      `);
      overlay.querySelector('#create-proj-submit').addEventListener('click', async () => {
        const name = overlay.querySelector('#proj-name-inp').value.trim();
        const description = overlay.querySelector('#proj-desc-inp').value.trim();
        if (!name) return showToast('warning', 'Required', 'Project name is required');
        try {
          await ApiClient.post('/projects', { name, description });
          showToast('success', 'Created!', `Project "${name}" created`);
          overlay.remove();
          loadProjects();
        } catch (err) { showToast('error', 'Error', err.message); }
      });
    });

    // ── Join Project (Student) ─────────────────────────────────
    document.getElementById('join-btn')?.addEventListener('click', () => {
      const overlay = openModal(`
        <div class="modal-header"><h3>Join a Project</h3><button class="modal-close">×</button></div>
        <p class="text-muted text-sm" style="margin-bottom:16px;">Ask your teacher for the Project ID, then paste it below.</p>
        <div class="form-group"><label>Project ID</label><input type="text" id="join-id" class="form-control" placeholder="Paste the Project ID here"></div>
        <button class="btn btn-primary" style="width:100%" id="join-submit">🔗 Join Project</button>
      `);
      overlay.querySelector('#join-submit').addEventListener('click', async () => {
        const projectId = overlay.querySelector('#join-id').value.trim();
        if (!projectId) return;
        try {
          await ApiClient.post(`/projects/${projectId}/members`, { memberId: user.id });
          showToast('success', 'Joined!', 'You joined the project');
          overlay.remove();
          loadProjects();
        } catch (err) { showToast('error', 'Error', err.message); }
      });
    });

    document.getElementById('close-detail').addEventListener('click', () => {
      document.getElementById('project-detail').style.display = 'none';
      if (socket) { socket.disconnect(); socket = null; }
    });

    loadProjects();
  </script>
</body>
</html>
