<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — ProjectHub</title>
  <meta name="description" content="Sign in to ProjectHub — the ultimate team contribution tracker for students and faculty.">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; overflow: hidden; }
    
    /* Dedicated Auth Background */
    .auth-bg {
      position: fixed; inset: 0; z-index: -1;
      background: radial-gradient(circle at center, #0d0d2b 0%, #07071a 100%);
    }
    .auth-bg::before, .auth-bg::after {
      content: ''; position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4;
      animation: drift 20s infinite alternate ease-in-out;
    }
    .auth-bg::before { width: 500px; height: 500px; background: rgba(124,58,237,0.3); top: -200px; left: -200px; }
    .auth-bg::after { width: 400px; height: 400px; background: rgba(6,182,212,0.2); bottom: -150px; right: -150px; animation-delay: -10s; }
    @keyframes drift {
      from { transform: translate(0,0); }
      to { transform: translate(100px, 50px); }
    }

    .auth-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 100%; max-width: 960px;
      min-height: 600px;
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: 0 40px 100px rgba(0,0,0,0.8), inset 0 0 0 1px rgba(255,255,255,0.05);
      background: rgba(13,13,43,0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    /* ── Brand Side ── */
    .auth-brand {
      background: linear-gradient(135deg, rgba(26,5,51,0.8) 0%, rgba(12,26,61,0.8) 100%);
      padding: 60px 50px;
      display: flex; flex-direction: column; justify-content: space-between;
      position: relative; overflow: hidden;
    }
    .auth-brand::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    }
    
    .brand-logo-area { position: relative; z-index: 1; }
    .brand-logo {
      width: 64px; height: 64px;
      background: var(--gradient-brand);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      margin-bottom: 24px;
      box-shadow: 0 10px 40px var(--accent-glow);
      animation: float 4s ease-in-out infinite;
    }
    .brand-title { font-family: 'Space Grotesk', sans-serif; font-size: 2.2rem; font-weight: 700; color: #fff; line-height: 1.1; margin-bottom: 12px; }
    .brand-sub { color: var(--text-secondary); font-size: 1.05rem; line-height: 1.6; }
    
    .brand-features { position: relative; z-index: 1; display: flex; flex-direction: column; gap: 16px; }
    .brand-feature {
      display: flex; align-items: center; gap: 14px;
      color: var(--text-primary); font-size: 0.95rem; font-weight: 500;
    }
    .brand-feature-icon { 
      width: 32px; height: 32px; border-radius: 8px; background: rgba(255,255,255,0.05);
      display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
    }

    /* ── Form Side ── */
    .auth-form-side {
      padding: 60px 50px;
      display: flex; flex-direction: column; justify-content: center;
    }
    .auth-form-side h2 { font-size: 1.8rem; margin-bottom: 8px; color: white; }
    .auth-form-side .subtitle { color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 40px; }

    /* ── Demo buttons ── */
    .demo-btns { display: flex; gap: 12px; margin-top: 24px; }
    .demo-btn {
      flex: 1; padding: 12px;
      border-radius: var(--radius-md);
      border: 1px solid rgba(255,255,255,0.05);
      background: rgba(255,255,255,0.02);
      color: var(--text-secondary); font-size: 0.85rem; font-weight: 500; cursor: pointer;
      transition: all var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .demo-btn:hover { border-color: var(--accent); color: var(--text-primary); background: rgba(124,58,237,0.05); transform: translateY(-2px); box-shadow: 0 4px 15px rgba(124,58,237,0.1); }

    /* ── Error/Success ── */
    .auth-alert {
      padding: 14px 16px;
      border-radius: var(--radius-md);
      font-size: 0.9rem; font-weight: 500;
      margin-bottom: 20px;
      display: none; animation: slideInLeft 0.3s ease;
    }
    .auth-alert.error   { background: rgba(244,63,94,0.1); border: 1px solid rgba(244,63,94,0.3); color: #fb7185; }
    .auth-alert.success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #34d399; }

    /* ── Password Toggle ── */
    .input-wrap { position: relative; }
    .pw-toggle {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.1rem;
      transition: color var(--transition);
    }
    .pw-toggle:hover { color: var(--accent-light); }

    @media (max-width: 768px) {
      .auth-container { grid-template-columns: 1fr; }
      .auth-brand { display: none; }
      .auth-form-side { padding: 40px 30px; }
    }
  </style>
</head>
<body>
  <div class="auth-bg"></div>

  <div class="auth-container animate-in">
    <!-- Brand Side -->
    <div class="auth-brand">
      <div class="brand-logo-area">
        <div class="brand-logo">🚀</div>
        <div class="brand-title">ProjectHub</div>
        <div class="brand-sub">The ultimate team collaboration platform. Sync tasks, track progress, and climb the leaderboard in real-time.</div>
      </div>
      <div class="brand-features">
        <div class="brand-feature animate-in"><div class="brand-feature-icon">📊</div> Real-time analytics</div>
        <div class="brand-feature animate-in"><div class="brand-feature-icon">🔥</div> Live Kanban updates</div>
        <div class="brand-feature animate-in"><div class="brand-feature-icon">🏆</div> Gamified leaderboard</div>
      </div>
    </div>

    <!-- Form Side -->
    <div class="auth-form-side">
      <h2>Welcome back 👋</h2>
      <p class="subtitle">Sign in to continue to your workspace</p>

      <div id="auth-alert" class="auth-alert"></div>

      <form id="login-form" novalidate>
        <div class="form-group animate-in">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group animate-in">
          <div style="display:flex;justify-content:space-between;">
            <label for="password">Password</label>
          </div>
          <div class="input-wrap">
            <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="pw-toggle" id="pw-toggle" title="Toggle password">👁</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg animate-in" style="width:100%; margin-top: 10px;" id="submit-btn">
          <span id="btn-text">Sign In</span>
          <span id="btn-spinner" class="spinner" style="display:none"></span>
        </button>
      </form>

      <p class="animate-in" style="text-align:center; margin-top:32px; font-size:0.9rem; color:var(--text-muted)">
        Don't have an account? <a href="signup.html" style="color:var(--accent-light);font-weight:600">Sign up free →</a>
      </p>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    import { ApiClient } from '../js/api.js';
    import { showToast, initToast } from '../js/ui.js';

    initToast();

    // Redirect if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html';
    }

    // Password toggle
    document.getElementById('pw-toggle').addEventListener('click', () => {
      const pw = document.getElementById('password');
      const btn = document.getElementById('pw-toggle');
      pw.type = pw.type === 'password' ? 'text' : 'password';
      btn.textContent = pw.type === 'password' ? '👁' : '🙈';
    });

    // Login form
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const alert = document.getElementById('auth-alert');
      const btnText = document.getElementById('btn-text');
      const spinner = document.getElementById('btn-spinner');

      alert.style.display = 'none';
      btnText.style.display = 'none';
      spinner.style.display = 'inline-block';

      try {
        const res = await ApiClient.post('/auth/login', { email, password });
        localStorage.setItem('token', res.token);
        localStorage.setItem('user', JSON.stringify(res.user));
        showToast('success', 'Welcome back!', `Hello, ${res.user.name}`);
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
      } catch (err) {
        alert.textContent = err.message || 'Login failed. Please try again.';
        alert.className = 'auth-alert error';
        alert.style.display = 'block';
        btnText.style.display = 'inline';
        spinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
