<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — ProjectHub</title>
  <style>
    body {
      margin: 0; padding: 0; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: radial-gradient(circle at center, #0d0d2b 0%, #07071a 100%);
      color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-align: center;
    }
    .error-code {
      font-size: 6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #7c3aed 0%, #06b6d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
      line-height: 1;
    }
    .error-title {
      font-size: 1.5rem;
      margin: 16px 0;
      font-weight: 600;
    }
    .error-desc {
      color: #9ca3af;
      margin-bottom: 32px;
      max-width: 400px;
    }
    .btn-home {
      background: #7c3aed;
      color: white;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn-home:hover {
      background: #6d28d9;
    }
  </style>
</head>
<body>
  <h1 class="error-code">404</h1>
  <div class="error-title">Page Not Found</div>
  <div class="error-desc">We couldn't find the page you were looking for. It might have been moved or doesn't exist.</div>
  <a href="/" class="btn-home">Return to Home</a>
</body>
</html>
